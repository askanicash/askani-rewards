<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Loading...</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#f5f5f5;
}
.box{
background:#fff;
padding:30px;
border-radius:10px;
text-align:center;
box-shadow:0 0 10px rgba(0,0,0,.2);
}
button{
padding:12px 25px;
font-size:18px;
background:#2563eb;
color:#fff;
border:none;
border-radius:6px;
cursor:pointer;
}
</style>

</head>
<body>

<div class="box">
<h2>Please Wait...</h2>
<p>Redirecting in <span id="time">5</span> seconds</p>

<button id="btn" style="display:none;">Continue</button>
</div>

<script>

let t=5;

let x=setInterval(function(){

t--;

document.getElementById("time").innerHTML=t;

if(t==0){

clearInterval(x);

document.getElementById("btn").style.display="inline-block";

}

},1000);

document.getElementById("btn").onclick=function(){

window.location.href="https://YOUR_MONETAG_DIRECT_LINK";

};

</script>

</body>
</html>
