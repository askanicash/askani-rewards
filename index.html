<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Cash Earn</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Daily Cash Earn</h1>
</header>

<div class="container">

    <!-- Register -->
    <div class="card">
        <h2>Register</h2>

        <input type="text" id="regUsername" placeholder="Username">

        <input type="email" id="regEmail" placeholder="Email">

        <input type="password" id="regPassword" placeholder="Password">

        <button onclick="registerUser()">
            Register
        </button>
    </div>

    <!-- Login -->
    <div class="card">
        <h2>Login</h2>

        <input type="email" id="loginEmail" placeholder="Email">

        <input type="password" id="loginPassword" placeholder="Password">

        <button onclick="loginUser()">
            Login
        </button>
    </div>

    <!-- Dashboard -->
    <div class="card" id="dashboard" style="display:none;">

        <h2>User Dashboard</h2>

        <h3 id="welcome"></h3>

        <div class="earnings">

            <button onclick="openLink(1)">
                PTC Ads
            </button>

            <button onclick="openLink(2)">
                Short Link
            </button>

            <button onclick="openLink(3)">
                Visit Earn
            </button>

            <button onclick="openLink(4)">
                PTC Ads
            </button>

            <button onclick="openLink(5)">
                PTC Ads
            </button>

        </div>

        <hr>

        <h3>Withdraw Request</h3>

        <input type="text" id="withdrawName" placeholder="Your Name">

        <input type="number" id="withdrawAmount" placeholder="Amount">

        <select id="paymentMethod">

            <option>JazzCash</option>

            <option>Easypaisa</option>

            <option>SadaPay</option>

            <option>FaucetPay</option>

            <option>Binance</option>

        </select>

        <input type="text"
               id="accountNumber"
               placeholder="Account Number">

        <button onclick="sendWithdraw()">
            Request Payment
        </button>

    </div>

</div>

<script type="module" src="script.js"></script>

</body>
</html>
