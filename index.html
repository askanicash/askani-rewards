<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Askani Cash - Complete Earning Script</title>
    <!-- Tailwind CSS Link for Modern Dark UI -->
    <script src="https://tailwindcss.com"></script>
    <style>
        body {
            background-color: #0b111e;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .custom-card {
            background-color: #161f30;
            border: 1px solid #232f45;
        }
        .ad-btn {
            background-color: #1c273c;
            border: 1px solid #2d3d5a;
            transition: all 0.3s ease;
        }
        .ad-btn:hover {
            background-color: #24334f;
            border-color: #3b82f6;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between">

    <!-- 1. AUTHENTICATION SECTION (Register / Login) -->
    <div id="auth-section" class="flex-grow flex items-center justify-center p-4">
        <div class="w-full max-w-md p-6 rounded-xl custom-card shadow-lg">
            <h2 id="auth-title" class="text-2xl font-bold text-center mb-6 text-blue-400">Create Account</h2>
            
            <form id="auth-form" onsubmit="handleAuth(event)">
                <!-- Full Name (Only for Registration) -->
                <div id="name-group" class="mb-4">
                    <label class="block text-sm text-gray-400 mb-1">Full Name</label>
                    <input type="text" id="username" class="w-full bg-[#0b111e] border border-[#232f45] rounded p-2.5 text-white focus:outline-none focus:border-blue-500" placeholder="e.g. Saeedaskani" required>
                </div>

                <!-- Email / Username -->
                <div class="mb-4">
                    <label class="block text-sm text-gray-400 mb-1">Email Address</label>
                    <input type="email" id="email" class="w-full bg-[#0b111e] border border-[#232f45] rounded p-2.5 text-white focus:outline-none focus:border-blue-500" placeholder="name@example.com" required>
                </div>

                <!-- Password -->
                <div class="mb-6">
                    <label class="block text-sm text-gray-400 mb-1">Password</label>
                    <input type="password" id="password" class="w-full bg-[#0b111e] border border-[#232f45] rounded p-2.5 text-white focus:outline-none focus:border-blue-500" placeholder="••••••••" required>
                </div>

                <!-- Submit Button -->
                <button type="submit" id="submit-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium p-2.5 rounded transition">
                    Register Now
                </button>
            </form>

            <!-- Toggle Link -->
            <p class="text-sm text-gray-400 text-center mt-4">
                <span id="toggle-text">Already have an account?</span>
                <button onclick="toggleAuthMode()" id="toggle-btn" class="text-blue-400 hover:underline font-medium ml-1">Login</button>
            </p>
        </div>
    </div>

    <!-- 2. MAIN DASHBOARD SECTION (Hidden by default, shows after login) -->
    <div id="dashboard-section" class="hidden w-full max-w-4xl mx-auto p-4 flex-grow">
        <!-- Header Script Title -->
        <div class="text-xs text-gray-500 font-mono mb-4"># Askani Cash - Complete Earning Script</div>

        <!-- Top Statistics Cards -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
            <!-- Welcome Card -->
            <div class="p-4 rounded-lg custom-card text-center">
                <p class="text-xs text-gray-400 uppercase tracking-wider mb-1">Welcome</p>
                <p id="user-display" class="text-lg font-bold text-gray-200">Saeedaskani</p>
            </div>
            <!-- Total Balance Card -->
            <div class="p-4 rounded-lg custom-card text-center">
                <p class="text-xs text-gray-400 uppercase tracking-wider mb-1">Total Balance</p>
                <p class="text-xl font-extrabold text-white">PKR <span id="balance-display">0</span></p>
            </div>
            <!-- Referral Code Card -->
            <div class="p-4 rounded-lg custom-card text-center">
                <p class="text-xs text-gray-400 uppercase tracking-wider mb-1">Referral Code</p>
                <p id="referral-display" class="text-md font-bold text-blue-400">Saeedaskani 183</p>
            </div>
        </div>

        <!-- Action Navigation Buttons -->
        <div class="flex justify-center space-x-3 mb-8">
            <button class="px-5 py-1.5 bg-blue-600 text-sm rounded-full font-medium shadow">Tasks</button>
            <button onclick="triggerWithdraw()" class="px-5 py-1.5 bg-gray-800 hover:bg-gray-700 text-sm rounded-full font-medium transition">Withdraw</button>
            <button onclick="logout()" class="px-5 py-1.5 bg-red-900/40 hover:bg-red-900/60 text-red-400 text-sm rounded-full font-medium transition">Logout</button>
        </div>

        <!-- Daily Tasks Grid Area -->
        <div class="text-center mb-6">
            <h3 class="text-lg font-semibold tracking-wide">Daily Tasks (10 Ads)</h3>
        </div>

        <!-- Ads Grid (1 to 10) -->
        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-3 mb-12" id="ads-container">
            <!-- Ads will be dynamically generated by JS below to maintain perfect timer rules -->
        </div>
    </div>

    <!-- Script / Logic Handler -->
    <script>
        let isLoginMode = false; 
        let currentBalance = 0;
        let activeUsername = "Saeedaskani";

        // Toggle between Login and Registration Form View
        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            const authTitle = document.getElementById('auth-title');
            const nameGroup = document.getElementById('name-group');
            const submitBtn = document.getElementById('submit-btn');
            const toggleText = document.getElementById('toggle-text');
            const toggleBtn = document.getElementById('toggle-btn');
            const usernameInput = document.getElementById('username');

            if (isLoginMode) {
                authTitle.innerText = "Welcome Back";
                nameGroup.style.display = "none";
                usernameInput.removeAttribute('required');
                submitBtn.innerText = "Login to Dashboard";
                toggleText.innerText = "Don't have an account?";
                toggleBtn.innerText = "Register";
            } else {
                authTitle.innerText = "Create Account";
                nameGroup.style.display = "block";
                usernameInput.setAttribute('required', 'true');
                submitBtn.innerText = "Register Now";
                toggleText.innerText = "Already have an account?";
                toggleBtn.innerText = "Login";
            }
        }

        // Handle Signup/Login Submission
        function handleAuth(event) {
            event.preventDefault();
            
            if (!isLoginMode) {
                activeUsername = document.getElementById('username').value || "User";
            }

            // Sync user data to layout elements
            document.getElementById('user-display').innerText = activeUsername;
            document.getElementById('referral-display').innerText = activeUsername + " 183";
            document.getElementById('balance-display').innerText = currentBalance;

            // Switch Screen Panels
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('dashboard-section').classList.remove('hidden');

            // Render Ads Container dynamically
            renderAds();
        }

        // Generate Ads Grid UI with specific configuration
        function renderAds() {
            const container = document.getElementById('ads-container');
            container.innerHTML = ""; 

            for (let i = 1; i <= 10; i++) {
                let baseSeconds = 4 + i; // AD #1 = 5s, AD #2 = 6s, AD #10 = 14s
                
                const adBox = document.createElement('button');
                adBox.id = `ad-box-${i}`;
                adBox.className = "ad-btn p-4 rounded-lg text-center flex flex-col items-center justify-center cursor-pointer";
                adBox.onclick = () => startAdTimer(i, baseSeconds);

                adBox.innerHTML = `
                    <span class="text-[10px] text-gray-400 font-mono tracking-wider block mb-1">AD #${i}</span>
                    <span id="ad-timer-${i}" class="text-xs font-bold text-blue-400">${baseSeconds}s Timer</span>
                    <span class="text-[9px] text-green-500 bg-green-900/20 px-1.5 py-0.5 rounded mt-2 font-mono">+1 PKR</span>
                `;
                container.appendChild(adBox);
            }
        }

        // Dynamic Timer Countdown Function
        function startAdTimer(adId, seconds) {
            const timerLabel = document.getElementById(`ad-timer-${adId}`);
            const adBox = document.getElementById(`ad-box-${adId}`);
            
            // Prevent multiple clicks during active watch state
            adBox.style.pointerEvents = "none";
            adBox.classList.add('opacity-60');

            let timeLeft = seconds;
            const interval = setInterval(() => {
                timeLeft--;
                if (timeLeft > 0) {
                    timerLabel.innerText = `${timeLeft}s Left`;
                } else {
                    clearInterval(interval);
                    timerLabel.innerText = "✓ Claimed";
                    timerLabel.classList.remove('text-blue-400');
                    timerLabel.classList.add('text-green-400');
                    
                    // Add Balance upon complete watch run
                    currentBalance += 1;
