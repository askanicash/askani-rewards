
<!DOCTYPE html>
<html lang="en">
<head> 
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Cash Earn</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="top-banner">
    <!-- BEGIN AADS AD UNIT 2442378 -->

<div id="frame" style="width: 300px;margin: auto;z-index: 99998;height: auto">
          <iframe data-aa='2442378' src='//ad.a-ads.com/2442378/?size=468x60'
                            style='border:0; padding:0; width:468px; height:60px; overflow:hidden;display: block;margin: auto'></iframe>
        </div>

<!-- END AADS AD UNIT 2442378 -->
</div>

<div class="container">

    <h1>Daily Cash Earn</h1>

    <div class="card">
        <h2>Dashboard</h2>
        <p>Points: <span id="points">0</span></p>
        <p>100 Points = Rs.50</p>
    </div>

    <div class="card">
        <h2>PTC Ads</h2>

        <button onclick="openTask('ad1',1,'https://omg10.com/4/8159346',5)">PTC Ad 1 (+1)</button>

        <button onclick="openTask('ad2',1,'https://omg10.com/4/9495268',8)">PTC Ad 2 (+1)</button>

        <button onclick="openTask('ad3',1,'https://omg10.com/4/8054864',10)">PTC Ad 3 (+1)</button>

        <button onclick="openTask('ad4',1,'https://omg10.com/4/9916518')">PTC Ad 4 (+1)</button>

        <button onclick="openTask('ad5',1,'https://omg10.com/4/9869567')">PTC Ad 5 (+1)</button>

        <button onclick="openTask('ad6',1,'https://omg10.com/4/7870313')">PTC Ad 6 (+1)</button>

        <p class="note">
            Each ad can be claimed once every 5 hours.
        </p>
    </div>

    <div class="card">
        <h2>Shortlinks</h2>

        <button onclick="openTask('short1',10,'https://aoyco.in/go/5JOxsD')">
            Shortlink 1 (+3)
        </button>

        <button onclick="openTask('short2',10,'https://aoyco.in/go/vdDTad')">
            Shortlink 2 (+3)
        </button>
    </div>

    <div class="card">
        <h2>Withdrawal</h2>

        <select id="method">
            <option>JazzCash</option>
            <option>Easypaisa</option>
            <option>SadaPay</option>
            <option>FaucetPay</option>
            <option>Binance USDT</option>
        </select>

        <input
            type="text"
            id="account"
            placeholder="Enter Account Number / Wallet"
        >

        <button onclick="withdrawRequest()">
            Withdraw 100 Points
        </button>
    </div>

    <div class="card">
        <h2>Withdrawal History</h2>
        <ul id="history"></ul>
    </div>

</div>

<div class="bottom-banner">
    
</div>

<script src="script.js"></script>

</body>
</html>
