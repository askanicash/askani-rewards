<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Daily Cash Earn</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
<h1>Daily Cash Earn</h1>

<div class="card">
<h2>Dashboard</h2>
<p>Points: <span id="points">0</span></p>
<p>100 Points = Rs.50</p>
</div>

<div class="card">
<h2>Ads Tasks</h2>
<button onclick="claimTask(1)">Ad 1 (+1)</button>
<button onclick="claimTask(2)">Ad 2 (+2)</button>
<button onclick="claimTask(3)">Ad 3 (+3)</button>
<button onclick="claimTask(4)">Ad 4 (+4)</button>
</div>

<div class="card">
<h2>Shortlinks</h2>
<button onclick="claimTask(10)">Shortlink 1 (+10)</button>
<button onclick="claimTask(10)">Shortlink 2 (+10)</button>
</div>

<div class="card">
<h2>Withdrawal</h2>

<select id="method">
<option>JazzCash</option>
<option>Easypaisa</option>
<option>SadaPay</option>
</select>

<input type="text" id="account" placeholder="Account Number">

<button onclick="withdrawRequest()">Request Withdrawal</button>

</div>

</div>

<script src="script.js"></script>
</body>
</html>
